<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .logo { fill: #4A6CF7; }
    </style>
  </defs>
  
  <!-- Main receipt body with rounded corners -->
  <rect class="logo" x="128" y="56" width="240" height="340" rx="20"/>
  
  <!-- Horizontal lines on receipt (cut out / white) -->
  <rect x="168" y="116" width="160" height="13" rx="6.5" fill="white"/>
  <rect x="168" y="158" width="124" height="13" rx="6.5" fill="white"/>
  <rect x="168" y="200" width="148" height="13" rx="6.5" fill="white"/>
  <rect x="168" y="242" width="110" height="13" rx="6.5" fill="white"/>
  <rect x="168" y="284" width="140" height="13" rx="6.5" fill="white"/>
  
  <!-- Check circle overlapping bottom-right -->
  <circle cx="370" cy="380" r="85" class="logo"/>
  <circle cx="370" cy="380" r="67" fill="white"/>
  
  <!-- Checkmark inside circle -->
  <polyline 
    points="340,382 360,402 402,348" 
    fill="none" 
    stroke="#4A6CF7" 
    stroke-width="16" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Solid ring for the circle -->
  <circle cx="370" cy="380" r="85" fill="none" stroke="#4A6CF7" stroke-width="18"/>
  
</svg>
